<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

</head>
<body>
<div class="container">
  <div class="container mt-5" style="postion: relative">
    <div class="row">
      <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
        <h1 class="text-center mt-3">Đăng ký</h1>
        <div class="card-body">
          <form th:action="@{/process_register}" th:object="${user}" method="post">
            <div class="form-group">
              <label>Họ tên</label>
              <input class="form-control" type="text" name="hoTen" th:field="*{hoTen}" placeholder="Nhập họ tên" required>
            </div>
            <div class="form-group">
              <label>Số điện thoại</label>
              <input class="form-control" type="text" name="sDT" th:field="*{sDT}" placeholder="Nhập số điện thoại" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input class="form-control" type="text" name="email" th:field="*{email}" placeholder="Nhập email" required>
            </div>
            <div class="form-group">
              <label>Tên đăng nhập</label>
              <input class="form-control" type="text" name="userName" th:field="*{userName}" placeholder="Nhập tên đăng nhập" required>
            </div>
            <div class="form-group">
              <label>Mật khẩu</label>
              <input class="form-control" type="text" name="password" th:field="*{password}" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="box-footer text-center">
              <button type="submit" class="btn btn-primary">
                Đăng ký
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
